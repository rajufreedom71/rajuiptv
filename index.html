<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Dashboard</title>
    <style>
        body { background-color: #0f111a; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .search-input { width: 100%; max-width: 600px; display: block; margin: 0 auto 30px auto; padding: 15px; border-radius: 25px; border: none; background: #1a1f29; color: #fff; outline: none; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; }
        .card { background: #1a1f29; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #242c3d; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: #f5b041; transform: translateY(-5px); }
        .icon { font-size: 30px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <input type="text" id="search" class="search-input" placeholder="Search channels...">
    <div class="grid-container" id="grid"></div>

    <script>
        let allChannels = [];
        async function loadPlaylist() {
            const response = await fetch('playlist.m3u');
            const text = await response.text();
            const lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i + 1];
                    allChannels.push({ name, url });
                }
            }
            render(allChannels);
        }

        function render(data) {
            document.getElementById('grid').innerHTML = data.map(ch => `
                <div class="card" onclick="window.open('${ch.url}')">
                    <span class="icon">📺</span>
                    <div style="font-size: 12px; font-weight: bold;">${ch.name}</div>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(e.target.value.toLowerCase()));
            render(filtered);
        });

        loadPlaylist();
    </script>
</body>
</html>
