<script>
    const m3uUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
    let player = videojs('my-video');

    async function init() {
        try {
            const response = await fetch(m3uUrl);
            const text = await response.text();
            const lines = text.split('\n');
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            
            let currentCategory = "";

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    // ক্যাটাগরি চেক - যদি না থাকে তবে ডিফল্ট হিসেবে ধরবে
                    const groupMatch = lines[i].match(/group-title="([^"]+)"/);
                    const category = groupMatch ? groupMatch[1] : "Channels";
                    
                    if (category !== currentCategory) {
                        currentCategory = category;
                        let catDiv = document.createElement('div');
                        catDiv.className = 'zoom-category-header';
                        catDiv.style.cssText = "background: #242c3d; padding: 10px; color: #f5b041; border-top: 1px solid #333;";
                        catDiv.innerHTML = `📁 ${category}`;
                        sidebar.appendChild(catDiv);
                    }

                    // চ্যানেলের নাম এবং লিঙ্ক
                    const name = lines[i].split(',')[1] || "Unnamed Channel";
                    const url = lines[i+1];
                    if (url && url.startsWith('http')) {
                        let chDiv = document.createElement('div');
                        chDiv.className = 'channel-item';
                        chDiv.innerHTML = name;
                        chDiv.onclick = () => { 
                            player.src({src: url, type: 'application/x-mpegURL'}); 
                            player.play(); 
                        };
                        sidebar.appendChild(chDiv);
                    }
                }
            }
        } catch (e) {
            document.getElementById('sidebar').innerHTML = "Failed to load list!";
        }
    }
    init();
</script>
