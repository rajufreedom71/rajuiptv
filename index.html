<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJU IPTV V2</title>

<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet"/>

<style>
body{
    margin:0;
    background:#0b0d12;
    color:#fff;
    font-family:Arial;
    display:flex;
    height:100vh;
}

/* LEFT PANEL */
.sidebar{
    width:360px;
    background:#141824;
    display:flex;
    flex-direction:column;
    border-right:1px solid #222;
}

/* HEADER */
.header{
    padding:15px;
    font-size:18px;
    font-weight:bold;
    border-bottom:1px solid #222;
}

/* SEARCH */
.search{
    padding:10px;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1f2433;
    color:white;
    outline:none;
}

/* CATEGORY */
.catBox{
    display:flex;
    flex-wrap:wrap;
    padding:10px;
    gap:6px;
}

.cat{
    padding:6px 10px;
    background:#1f2433;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
}

.cat.active{
    background:#f5b041;
    color:black;
}

/* LIST */
.list{
    flex:1;
    overflow:auto;
}

.item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.item:hover{
    background:#1f2433;
}

.item.active{
    background:#f5b041;
    color:black;
}

.item img{
    width:34px;
    height:34px;
    border-radius:50%;
}

/* RIGHT PLAYER */
.player{
    flex:1;
    position:relative;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
}

.now{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:6px;
    font-size:14px;
    z-index:10;
}

/* RESPONSIVE */
@media(max-width:768px){
    body{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
        height:45%;
    }
    .player{
        height:55%;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="header">📺 RAJU IPTV V2</div>

    <div class="search">
        <input id="search" placeholder="Search channel...">
    </div>

    <div class="catBox" id="cats"></div>

    <div class="list" id="list"></div>
</div>

<div class="player">
    <div class="now" id="now">▶ Select Channel</div>
    <video id="video" class="video-js vjs-big-play-centered" controls autoplay></video>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

<script>

const player = videojs('video');
const url = "https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u";

let data = [];
let filtered = [];
let category = "All";

const list = document.getElementById("list");
const cats = document.getElementById("cats");
const search = document.getElementById("search");
const now = document.getElementById("now");

/* LOAD M3U */
async function load(){
    const res = await fetch(url);
    const text = await res.text();
    const lines = text.split("\n");

    let temp = {};

    for(let i=0;i<lines.length;i++){
        if(lines[i].includes("#EXTINF")){
            const name = lines[i].split(",")[1] || "Unknown";

            const group = (lines[i].match(/group-title="(.*?)"/)||[])[1] || "Others";
            const logo = (lines[i].match(/tvg-logo="(.*?)"/)||[])[1] 
            || "https://cdn-icons-png.flaticon.com/512/1041/1041916.png";

            const link = lines[i+1];

            if(link && link.startsWith("http")){
                const key = name+link;
                temp[key] = {name, group, logo, link};
            }
        }
    }

    data = Object.values(temp);

    renderCats();
    renderList(data);
}

/* CATEGORIES */
function renderCats(){
    const groups = ["All", ...new Set(data.map(x=>x.group))];

    cats.innerHTML = "";

    groups.forEach(g=>{
        const d = document.createElement("div");
        d.className = "cat"+(g==="All"?" active":"");
        d.textContent = g;

        d.onclick = ()=>{
            document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
            d.classList.add("active");
            category = g;
            filter();
        };

        cats.appendChild(d);
    });
}

/* FILTER */
function filter(){
    let listData = data;

    if(category !== "All"){
        listData = listData.filter(x=>x.group === category);
    }

    const key = search.value.toLowerCase();
    if(key){
        listData = listData.filter(x=>x.name.toLowerCase().includes(key));
    }

    filtered = listData;
    renderList(listData);
}

/* RENDER LIST */
function renderList(arr){
    list.innerHTML = "";

    arr.forEach(ch=>{
        const d = document.createElement("div");
        d.className = "item";

        d.innerHTML = `
            <img src="${ch.logo}">
            <div>${ch.name}</div>
        `;

        d.onclick = ()=>{
            document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
            d.classList.add("active");

            player.src({src:ch.link,type:"application/x-mpegURL"});
            player.play();

            now.innerText = "▶ Now Playing: " + ch.name;

            localStorage.setItem("last", JSON.stringify(ch));
        };

        list.appendChild(d);
    });

    /* auto restore last */
    const last = JSON.parse(localStorage.getItem("last")||"null");
    if(last){
        now.innerText = "▶ Last: " + last.name;
    }
}

/* SEARCH */
search.addEventListener("input", filter);

load();

</script>

</body>
</html>
