<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Pro - Watch Online</title>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <!-- FontAwesome for Zoom Style Arrows -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #11141a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1e2530, #0f1319);
            padding: 15px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00ffcc;
            border-bottom: 2px solid #1f2937;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row; /* এটি নিশ্চিত করে যে সাইডবার বামে থাকবে */
        }
        
        /* Sidebar Section (Moved to the LEFT) */
        .playlist-section {
            flex: 1;
            background-color: #1a1f29;
            border-right: 2px solid #242c3d; /* ডান পাশে বর্ডার */
            display: flex;
            flex-direction: column;
            max-width: 400px;
            min-width: 320px;
            order: 1; /* বামে রাখার জন্য অর্ডার ১ */
        }
        
        /* Video Player Section */
        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            order: 2; /* ডানে রাখার জন্য অর্ডার ২ */
        }
        
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        
        .playlist-header {
            padding: 15px;
            background-color: #242c3d;
            font-weight: bold;
            font-size: 16px;
            color: #00ffcc;
            border-bottom: 1px solid #2e384e;
        }
        
        /* Zoom Workplace Style Nested Sidebar Container */
        .zoom-sidebar {
            overflow-y: auto;
            flex: 1;
            padding: 10px 0;
        }

        /* Zoom Accordion Category Header */
        .zoom-category-header {
            width: 100%;
            background: transparent;
            color: #b3c2d4;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s, color 0.2s;
        }
        .zoom-category-header:hover {
            background-color: #242c3d;
            color: #ffffff;
        }
        /* Arrow icon style */
        .zoom-category-header i.arrow {
            font-size: 12px;
            transition: transform 0.2s ease;
            width: 12px;
        }
        /* When expanded, rotate arrow down */
        .zoom-category-header.expanded {
            color: #ffffff;
        }
        .zoom-category-header.expanded i.arrow {
            transform: rotate(90deg);
        }

        /* Channel Sub-list (Hidden by default) */
        .zoom-channel-sublist {
            list-style: none;
            display: none;
            background-color: #151922;
            padding-left: 15px; /* Nested look like Zoom */
        }
        /* Show when active */
        .zoom-channel-sublist.show {
            display: block;
        }

        /* Individual Channel Styling inside Category */
        .channel-item {
            padding: 10px 20px;
            border-bottom: 1px solid #1e2530;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #cbd5e1;
        }
        .channel-item:hover {
            background-color: #242c3d;
            color: #00ffcc;
        }
        .channel-item.active {
            background-color: #0e71eb; /* Zoom Premium Blue Selection */
            color: #ffffff;
            font-weight: bold;
        }
        .channel-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background-color: #2e384e;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
        }
        .channel-item.active .channel-icon {
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        /* Responsive design for Mobile */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .player-section {
                order: 1; /* মোবাইলে ভিডিও প্লেয়ার উপরে থাকবে */
                height: 250px;
            }
            .playlist-section {
                order: 2; /* মোবাইলে সাইডবার নিচে থাকবে */
                max-width: 100%;
                min-width: 100%;
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <header>📺 LIVE TV PRO</header>

    <div class="main-container">
        <!-- Sidebar Section (Left side) -->
        <div class="playlist-section">
            <div class="playlist-header">চ্যানেল ক্যাটাগরি (<span id="count">0</span>)</div>
            
            <!-- Zoom Style Vertical Accordion Container -->
            <div class="zoom-sidebar" id="zoom-sidebar-container">
                <!-- Dynamic categories and channels will load here -->
            </div>
        </div>

        <!-- Video Player Section (Right side) -->
        <div class="player-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto" data-setup="{}">
                <p class="vjs-no-js">
                    To view this video please enable JavaScript
                </p>
            </video>
        </div>
    </div>

    <!-- Video.js Scripts -->
    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
        
        const player = videojs('my-video');
        const zoomSidebarContainer = document.getElementById('zoom-sidebar-container');
        const countElement = document.getElementById('count');

        let allChannels = [];

        async function fetchAndParseM3U() {
            try {
                const response = await fetch(m3uUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                
                const lines = text.split('\n');
                let currentChannel = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        let category = "General";
                        const groupMatch = line.match(/group-title="([^"]+)"/);
                        if (groupMatch && groupMatch[1]) {
                            category = groupMatch[1];
                        }

                        const nameIndex = line.lastIndexOf(',');
                        let name = "Unknown Channel";
                        if (nameIndex !== -1) {
                            name = line.substring(nameIndex + 1).trim();
                        }
                        currentChannel = { name: name, category: category };
                    } else if (line.startsWith('http://') || line.startsWith('https://')) {
                        if (currentChannel) {
                            currentChannel.url = line;
                            allChannels.push(currentChannel);
                            currentChannel = null;
                        }
                    }
                }

                countElement.innerText = allChannels.length;

                const groupedChannels = {};
                allChannels.forEach(channel => {
                    if (!groupedChannels[channel.category]) {
                        groupedChannels[channel.category] = [];
                    }
                    groupedChannels[channel.category].push(channel);
                });

                renderZoomSidebar(groupedChannels);
                
            } catch (error) {
                console.error('Error loading M3U file:', error);
                zoomSidebarContainer.innerHTML = '<div style="padding: 20px; color: red; text-align: center;">প্লেলিস্ট লোড করা যায়নি!</div>';
            }
        }

        function renderZoomSidebar(groupedData) {
            zoomSidebarContainer.innerHTML = '';

            let isFirstChannelSet = false;

            Object.keys(groupedData).forEach((categoryName, catIndex) => {
                
                const headerBtn = document.createElement('button');
                headerBtn.className = 'zoom-category-header';
                headerBtn.innerHTML = `<i class="fa-solid fa-chevron-right arrow"></i> <i class="fa-regular fa-folder"></i> ${categoryName} (${groupedData[categoryName].length})`;
                
                const subListUl = document.createElement('ul');
                subListUl.className = 'zoom-channel-sublist';

                groupedData[categoryName].forEach((channel) => {
                    const li = document.createElement('li');
                    li.className = 'channel-item';
                    
                    const firstLetter = channel.name.charAt(0).toUpperCase();
                    li.innerHTML = `
                        <div class="channel-icon">${firstLetter}</div>
                        <div>${channel.name}</div>
                    `;

                    li.addEventListener('click', (e) => {
                        e.stopPropagation();
                        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');

                        player.src({
                            src: channel.url,
                            type: 'application/x-mpegURL'
                        });
                        player.play();
                    });

                    subListUl.appendChild(li);

                    if (!isFirstChannelSet) {
                        li.classList.add('active');
                        player.src({
                            src: channel.url,
                            type: 'application/x-mpegURL'
                        });
                        
                        headerBtn.classList.add('expanded');
                        subListUl.classList.add('show');
                        isFirstChannelSet = true;
                    }
                });

                headerBtn.addEventListener('click', () => {
                    const isExpanded = headerBtn.classList.contains('expanded');

                    if (isExpanded) {
                        headerBtn.classList.remove('expanded');
                        subListUl.classList.remove('show');
                    } else {
                        headerBtn.classList.add('expanded');
                        subListUl.classList.add('show');
                    }
                });

                zoomSidebarContainer.appendChild(headerBtn);
                zoomSidebarContainer.appendChild(subListUl);
            });
        }

        window.onload = fetchAndParseM3U;
    </script>
</body>
</html>
