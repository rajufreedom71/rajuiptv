<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free IPTV by RAJU</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      background: #111; 
      color: #fff; 
    }
    .player { 
      width: 100%; 
      max-width: 1000px; 
      margin: 20px auto; 
    }
    video { 
      width: 100%; 
      background: black; 
    }
    .controls { 
      text-align: center; 
      margin: 15px; 
    }
    input, button, select { 
      padding: 10px; 
      margin: 5px; 
    }
    select { 
      width: 520px; 
    }
    #status { color: #0f0; margin: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Free IPTV by RAJU</h2>

  <div class="player">
    <video id="video" controls autoplay></video>
  </div>

  <div class="controls">
    <input type="text" id="playlistUrl" placeholder="Enter M3U URL (optional)" style="width:450px;" value="playlist.m3u">
    <button onclick="loadPlaylist()">Load Playlist</button>
    <br><br>
    <div id="status">Loading playlist...</div>
    <select id="channelList" size="20" onchange="playChannel(this.value)"></select>
  </div>

  <script>
    let hls;
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    async function loadPlaylist(customUrl = null) {
      const url = customUrl || document.getElementById('playlistUrl').value.trim() || 'playlist.m3u';
      
      status.textContent = "Loading channels...";
      
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Load failed");

        const text = await res.text();
        const channels = [];
        const lines = text.split('\n');
        let current = {};

        for (let line of lines) {
          if (line.startsWith('#EXTINF')) {
            current.name = line.split(',').pop().trim() || "Unknown Channel";
          } else if (line && !line.startsWith('#') && current.name) {
            current.url = line.trim();
            channels.push({name: current.name, url: current.url});
            current = {};
          }
        }

        const select = document.getElementById('channelList');
        select.innerHTML = '';
        channels.forEach(ch => {
          const opt = document.createElement('option');
          opt.value = ch.url;
          opt.textContent = ch.name;
          select.appendChild(opt);
        });

        status.textContent = `✅ Loaded ${channels.length} channels`;
        
      } catch (e) {
        status.textContent = "❌ Error loading playlist";
        console.error(e);
      }
    }

    function playChannel(url) {
      if (!url) return;
      
      if (hls) hls.destroy();
      
      if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } else {
        video.src = url;
      }
      video.play().catch(() => {});
    }

    // Auto load playlist.m3u when page opens
    window.onload = loadPlaylist;
  </script>
</body>
</html>
