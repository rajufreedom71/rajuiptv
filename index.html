<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro IPTV by RAJU</title>

<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet"/>

<style>
body{
    margin:0;
    background:#0f1117;
    color:white;
    font-family:sans-serif;
    display:flex;
    height:100vh;
}

/* Sidebar */
.sidebar{
    width:340px;
    background:#181c24;
    display:flex;
    flex-direction:column;
    border-right:1px solid #2d3442;
}

/* Search */
.search-box{
    padding:12px;
}

.search-box input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#242c3d;
    color:white;
    outline:none;
}

/* Categories */
.categories{
    display:flex;
    flex-wrap:wrap;
    padding:10px;
    gap:6px;
}

.cat{
    padding:6px 10px;
    background:#242c3d;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
}

.cat.active{
    background:#f5b041;
    color:black;
}

/* Channel list */
.channel-list{
    overflow-y:auto;
    flex:1;
}

.channel{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.channel:hover{
    background:#242c3d;
}

.channel.active{
    background:#f5b041;
    color:black;
}

.channel img{
    width:34px;
    height:34px;
    border-radius:50%;
    object-fit:cover;
}

/* Player */
.player{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

#nowPlaying{
    position:absolute;
    top:12px;
    left:12px;
    z-index:10;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:6px;
    font-size:14px;
}

/* Responsive */
@media(max-width:768px){
    body{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
        height:45%;
    }
    .player{
        height:55%;
    }
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="search-box">
        <input type="text" id="search" placeholder="Search channel...">
    </div>

    <div class="categories" id="categories"></div>

    <div class="channel-list" id="channelList"></div>

</div>

<div class="player">
    <div id="nowPlaying">▶ Now Playing: None</div>
    <video id="video" class="video-js vjs-big-play-centered" controls autoplay></video>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

<script>
const player = videojs('video');
const playlistUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';

let channels = [];
let filtered = [];
let currentCategory = "All";

const channelList = document.getElementById('channelList');
const categoriesDiv = document.getElementById('categories');
const search = document.getElementById('search');
const nowPlaying = document.getElementById('nowPlaying');

/* Parse M3U */
async function loadPlaylist(){
    const res = await fetch(playlistUrl);
    const text = await res.text();
    const lines = text.split('\n');

    let temp = {};

    for(let i=0;i<lines.length;i++){
        if(lines[i].startsWith('#EXTINF')){
            const info = lines[i];

            const name = info.split(',')[1] || "Unknown";

            const groupMatch = info.match(/group-title="(.*?)"/);
            const logoMatch = info.match(/tvg-logo="(.*?)"/);

            const group = groupMatch ? groupMatch[1] : "Others";
            const logo = logoMatch ? logoMatch[1] : "https://cdn-icons-png.flaticon.com/512/1041/1041916.png";

            const url = lines[i+1];

            if(url && url.startsWith('http')){
                const key = name + url;

                if(!temp[key]){
                    temp[key] = {
                        name,
                        group,
                        logo,
                        url
                    };
                }
            }
        }
    }

    channels = Object.values(temp);
    renderCategories();
    renderChannels(channels);
}

/* Categories */
function renderCategories(){
    const groups = ["All", ...new Set(channels.map(c=>c.group))];

    categoriesDiv.innerHTML = "";

    groups.forEach(g=>{
        const div = document.createElement('div');
        div.className = 'cat' + (g==="All"?" active":"");
        div.textContent = g;

        div.onclick = ()=>{
            document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));
            div.classList.add('active');

            currentCategory = g;
            filterChannels();
        };

        categoriesDiv.appendChild(div);
    });
}

/* Filter */
function filterChannels(){
    let list = channels;

    if(currentCategory !== "All"){
        list = list.filter(c=>c.group === currentCategory);
    }

    const keyword = search.value.toLowerCase();

    if(keyword){
        list = list.filter(c=>c.name.toLowerCase().includes(keyword));
    }

    filtered = list;
    renderChannels(list);
}

/* Render channels */
function renderChannels(list){
    channelList.innerHTML = "";

    list.forEach(ch=>{
        const div = document.createElement('div');
        div.className = 'channel';

        div.innerHTML = `
            <img src="${ch.logo}">
            <span>${ch.name}</span>
        `;

        div.onclick = ()=>{
            playChannel(ch, div);
        };

        channelList.appendChild(div);
    });
}

/* Play */
function playChannel(ch, el){

    document.querySelectorAll('.channel').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');

    player.src({ src: ch.url, type: 'application/x-mpegURL' });
    player.play();

    nowPlaying.textContent = "▶ Now Playing: " + ch.name;
}

/* Search */
search.addEventListener('input', filterChannels);

loadPlaylist();
</script>

</body>
</html>
