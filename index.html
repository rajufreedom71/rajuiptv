<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free IPTV by RAJU</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #11141a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #161b26, #090b10);
            padding: 16px 20px;
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to right, #ffe066, #f5b041);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 4px 10px rgba(245, 176, 65, 0.2);
            border-bottom: 2px solid #1f2937;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        .playlist-section {
            display: flex;
            flex-direction: column;
            background-color: #1a1f29;
            border-right: 2px solid #242c3d;
            flex: 1;
            max-width: 400px;
            min-width: 320px;
            order: 1;
            overflow: hidden;
        }

        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            order: 2;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        .search-box-container {
            padding: 12px 15px;
            background-color: #1e2530;
            border-bottom: 1px solid #2e384e;
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .search-input {
            flex: 1;
            min-width: 0;
            padding: 10px 12px 10px 38px;
            background-color: #242c3d;
            border: 1px solid #2e384e;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #f5b041;
            box-shadow: 0 0 10px rgba(245, 176, 65, 0.2);
            background-color: #2a3445;
        }
        .search-icon {
            position: absolute;
            left: 27px;
            top: 50%;
            transform: translateY(-50%);
            color: #8899a6;
            font-size: 14px;
            pointer-events: none;
        }

        .telegram-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 12px;
            background: linear-gradient(135deg, #0088cc 0%, #005aa0 100%);
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1.5px solid #0099dd;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
        }
        .telegram-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .telegram-link:hover::before { left: 100%; }
        .telegram-link:hover {
            background: linear-gradient(135deg, #00a8e8 0%, #0088cc 100%);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.6), 0 0 40px rgba(0, 136, 204, 0.3);
            transform: translateY(-2px);
            border-color: #00d4ff;
        }
        .telegram-link:active { transform: translateY(0); }
        .telegram-link i { font-size: 16px; transition: transform 0.3s ease; }
        .telegram-link:hover i { transform: scale(1.1); }
        .telegram-text { display: block; }

        .zoom-sidebar {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        .zoom-category-header {
            width: 100%;
            background: transparent;
            color: #b3c2d4;
            border: none;
            padding: 13px 20px;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #1f2633;
            transition: background 0.2s, color 0.2s;
        }
        .zoom-category-header:hover { background-color: #242c3d; color: #ffffff; }
        .zoom-category-header i.arrow { font-size: 12px; transition: transform 0.2s ease; width: 12px; }
        .zoom-category-header.expanded { color: #f5b041; background-color: #1f2633; border-bottom: none; }
        .zoom-category-header.expanded i.arrow { transform: rotate(90deg); }
        .all-header { color: #b3c2d4 !important; }
        .fav-header { color: #ffcc00 !important; }

        .zoom-channel-sublist {
            list-style: none;
            display: none;
            background-color: #141822;
            border-left: 3px solid #242c3d;
            margin-left: 10px;
        }
        .zoom-channel-sublist.show { display: block; }

        .channel-item {
            padding: 10px 15px;
            border-bottom: 1px solid #1a202c;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #cbd5e1;
            position: relative;
        }
        .channel-item:hover { background-color: #1f2633; color: #f5b041; }
        .channel-item.active {
            background: linear-gradient(90deg, #1d2b3a, #151e29);
            color: #f5b041;
            font-weight: bold;
            border-left: 3px solid #f5b041;
            box-shadow: inset 5px 0 10px rgba(245, 176, 65, 0.05);
        }

        .channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: linear-gradient(135deg, #2e384e, #242c3d);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid #3a4556;
            position: relative;
        }
        .channel-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }
        .channel-logo-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f5b041, #e89b3c);
            color: #11141a; font-weight: bold; font-size: 16px; border-radius: 5px;
        }
        .channel-item.active .channel-logo { border-color: #f5b041; box-shadow: 0 0 8px rgba(245, 176, 65, 0.3); }
        .channel-name-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .channel-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .fav-star-btn {
            position: relative; background: transparent; border: none; color: #4a5768;
            cursor: pointer; font-size: 16px; padding: 5px; transition: all 0.2s ease; flex-shrink: 0;
        }
        .fav-star-btn:hover { color: #ffcc00; transform: scale(1.2); }
        .fav-star-btn.starred { color: #ffcc00 !important; }

        /* Data Usage Overlay */
        .vjs-data-usage {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: #b3c2d4;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 50;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .vjs-quality-button {
            position: relative;
            cursor: pointer;
            width: 4em !important;
        }
        .vjs-quality-button .vjs-quality-label {
            font-size: 9px;
            position: absolute;
            bottom: 1px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5b041;
            color: #111;
            padding: 0 4px;
            border-radius: 2px;
            font-weight: 700;
            line-height: 1.3;
            white-space: nowrap;
            pointer-events: none;
        }
        .vjs-quality-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: rgba(20, 24, 34, 0.95);
            border: 1px solid #2e384e;
            border-radius: 8px;
            padding: 4px 0;
            min-width: 130px;
            z-index: 1000;
            display: none;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .vjs-quality-menu-item {
            display: block;
            width: 100%;
            padding: 8px 18px;
            background: none;
            border: none;
            color: #b3c2d4;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
        }
        .vjs-quality-menu-item:hover { background: #1f2633; color: #f5b041; }
        .vjs-quality-menu-item.active { color: #f5b041; font-weight: 600; background: #1d2b3a; border-left: 3px solid #f5b041; }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .player-section { order: 1; flex: none; width: 100%; aspect-ratio: 16 / 9; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
            .playlist-section { order: 2; max-width: 100%; min-width: 100%; flex: none; border-right: none; border-top: 2px solid #242c3d; overflow: visible; }
            .zoom-sidebar { overflow-y: visible; }
            header { font-size: 22px; padding: 14px; }
            .search-box-container { padding: 10px 12px; gap: 8px; }
            .search-input { padding: 9px 10px 9px 34px; font-size: 13px; }
            .search-icon { left: 22px; font-size: 13px; }
            .telegram-link { font-size: 10px; padding: 8px 10px; gap: 4px; }
            .telegram-link i { font-size: 14px; }
            .telegram-text { display: inline; }
            .channel-item { padding: 8px 12px; gap: 10px; }
            .channel-logo { width: 36px; height: 36px; }
        }
        @media (max-width: 480px) {
            .telegram-text { display: none; }
            .telegram-link { padding: 8px; }
            .telegram-link i { margin: 0; }
            .channel-item { padding: 8px 10px; gap: 8px; }
            .channel-logo { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>

    <header>📺 Free IPTV by RAJU</header>

    <div class="main-container">
        <div class="playlist-section">
            <div class="search-box-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search channels..." />
                <a href="https://t.me/freeiptvbyraju" target="_blank" class="telegram-link" title="Join with us for all Updates & feedback">
                    <i class="fa-brands fa-telegram"></i>
                    <span class="telegram-text">Join us</span>
                </a>
            </div>
            <div class="zoom-sidebar" id="zoom-sidebar-container">
                <div style="padding: 20px; color: #8899a6; text-align: center;" id="loading-text">Loading channels...</div>
            </div>
        </div>

        <div class="player-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay playsinline preload="auto" data-setup="{}">
                <p class="vjs-no-js">To view this video please enable JavaScript</p>
            </video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@2.1.0/dist/videojs-contrib-quality-levels.min.js"></script>

    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
        let player;
        let allChannels = [];
        let favoriteChannelUrls = JSON.parse(localStorage.getItem('fav_channels')) || [];

        const zoomSidebarContainer = document.getElementById('zoom-sidebar-container');
        const searchInput = document.getElementById('search-input');

        let qualityLevels = null;
        let qButton = null;
        let qMenu = null;
        let knownUrls = {};
        let dataUsedBytes = 0;
        let dataInterval = null;
        let dataLabel = null;

        function buildQualityMenu() {
            if (!qualityLevels || qualityLevels.length === 0) return;
            qMenu.innerHTML = '';

            var autoItem = document.createElement('div');
            autoItem.className = 'vjs-quality-menu-item active';
            autoItem.textContent = 'Auto';
            autoItem.dataset.quality = '-1';
            autoItem.addEventListener('click', function() {
                for (var j = 0; j < qualityLevels.length; j++) qualityLevels[j].enabled = true;
                qButton.querySelector('.vjs-quality-label').textContent = 'Auto';
                qMenu.style.display = 'none';
                qMenu.querySelectorAll('.vjs-quality-menu-item').forEach(function(el) { el.classList.remove('active'); });
                this.classList.add('active');
            });
            qMenu.appendChild(autoItem);

            for (var i = 0; i < qualityLevels.length; i++) {
                (function(idx) {
                    var level = qualityLevels[idx];
                    var label = level.height ? level.height + 'p' : (level.bitrate ? Math.round(level.bitrate / 1000) + 'k' : 'Level ' + (idx + 1));
                    var item = document.createElement('div');
                    item.className = 'vjs-quality-menu-item';
                    item.textContent = label;
                    item.dataset.quality = idx;
                    item.addEventListener('click', function() {
                        for (var j = 0; j < qualityLevels.length; j++) qualityLevels[j].enabled = (j === idx);
                        qButton.querySelector('.vjs-quality-label').textContent = label;
                        qMenu.style.display = 'none';
                        qMenu.querySelectorAll('.vjs-quality-menu-item').forEach(function(el) { el.classList.remove('active'); });
                        this.classList.add('active');
                    });
                    qMenu.appendChild(item);
                })(i);
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            player = videojs('my-video');

            player.ready(function() {
                var controlBar = this.controlBar;
                if (!controlBar) return;

                var fsToggle = controlBar.getChild('fullscreenToggle');
                if (!fsToggle || !fsToggle.el_) return;

                var fsEl = fsToggle.el_;

                qButton = document.createElement('button');
                qButton.className = 'vjs-control vjs-button vjs-quality-button';
                qButton.innerHTML = '<span class="vjs-icon-placeholder"><i class="fa-solid fa-gear"></i></span><span class="vjs-quality-label">Auto</span>';
                qButton.title = 'Quality';

                qMenu = document.createElement('div');
                qMenu.className = 'vjs-quality-menu';

                var wrapper = document.createElement('div');
                wrapper.style.position = 'relative';
                wrapper.style.display = 'inline-block';
                wrapper.appendChild(qButton);
                wrapper.appendChild(qMenu);

                fsEl.parentNode.insertBefore(wrapper, fsEl);

                qButton.addEventListener('click', function(e) {
                    e.stopPropagation();
                    qMenu.style.display = qMenu.style.display === 'block' ? 'none' : 'block';
                });

                document.addEventListener('click', function() { qMenu.style.display = 'none'; });
                qMenu.addEventListener('click', function(e) { e.stopPropagation(); });

                dataLabel = document.createElement('div');
                dataLabel.className = 'vjs-data-usage';
                dataLabel.textContent = '0.0 MB';
                player.el().appendChild(dataLabel);

                function updateDataUsage() {
                    try {
                        var entries = performance.getEntriesByType('resource');
                        var totalBytes = 0;
                        for (var ei = 0; ei < entries.length; ei++) {
                            var e = entries[ei];
                            if (e.transferSize > 0 && !knownUrls[e.name]) {
                                knownUrls[e.name] = true;
                                totalBytes += e.transferSize;
                            }
                        }
                    } catch (e) { totalBytes = 0; }
                    if (totalBytes > 0) dataUsedBytes += totalBytes;
                    var mb = (dataUsedBytes / (1024 * 1024)).toFixed(1);
                    dataLabel.textContent = mb + ' MB';
                }

                player.on('loadedmetadata', function() {
                    qualityLevels = player.qualityLevels();
                    if (qualityLevels && qualityLevels.length > 0) {
                        setTimeout(buildQualityMenu, 300);
                    } else {
                        qualityLevels = null;
                    }
                    if (dataInterval) clearInterval(dataInterval);
                    dataInterval = setInterval(updateDataUsage, 2000);
                });

                player.on('pause', function() {
                    if (dataInterval) { clearInterval(dataInterval); dataInterval = null; }
                });
                player.on('play', function() {
                    if (!dataInterval) dataInterval = setInterval(updateDataUsage, 2000);
                });
            });

            player.on('fullscreenchange', function() {
                if (player.isFullscreen()) {
                    if (screen.orientation && screen.orientation.lock)
                        screen.orientation.lock('landscape').catch(function(e) { console.log(e); });
                } else {
                    if (screen.orientation && screen.orientation.unlock)
                        screen.orientation.unlock();
                }
            });

            fetchAndParseM3U();
        });

        async function fetchAndParseM3U() {
            try {
                const response = await fetch(m3uUrl);
                if (!response.ok) throw new Error('Network error');
                const text = await response.text();
                const lines = text.split('\n');
                let currentChannel = null;
                allChannels = [];

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        let category = "General";
                        let logo = "";
                        const groupMatch = line.match(/group-title="([^"]+)"/);
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        if (groupMatch && groupMatch[1]) category = groupMatch[1];
                        if (logoMatch && logoMatch[1]) logo = logoMatch[1];
                        const nameIndex = line.lastIndexOf(',');
                        let name = nameIndex !== -1 ? line.substring(nameIndex + 1).trim() : "Unknown Channel";
                        currentChannel = { name: name, category: category, logo: logo };
                    } else if (line.startsWith('http')) {
                        if (currentChannel) {
                            currentChannel.url = line;
                            allChannels.push(currentChannel);
                            currentChannel = null;
                        }
                    }
                }
                renderSidebar();
                searchInput.addEventListener('input', function() { renderSidebar(searchInput.value.trim()); });
            } catch (error) {
                zoomSidebarContainer.innerHTML = '<div style="padding: 20px; color: red; text-align: center;">Playlist failed to load!</div>';
            }
        }

        function renderSidebar(filterKeyword) {
            if (filterKeyword === undefined) filterKeyword = '';
            zoomSidebarContainer.innerHTML = '';
            var keyword = filterKeyword.toLowerCase();
            var favChannels = allChannels.filter(function(c) { return favoriteChannelUrls.indexOf(c.url) !== -1; });
            var groupedChannels = {};

            allChannels.forEach(function(channel) {
                if (keyword && channel.name.toLowerCase().indexOf(keyword) === -1) return;
                if (!groupedChannels[channel.category]) groupedChannels[channel.category] = [];
                groupedChannels[channel.category].push(channel);
            });

            var shouldExpandAll = keyword !== '';
            if (allChannels.length > 0 && !keyword)
                createCategorySection('🌐 All Channels', allChannels, false, 'all-header');
            if (favChannels.length > 0) {
                var filteredFavs = favChannels.filter(function(c) { return c.name.toLowerCase().indexOf(keyword) !== -1; });
                if (filteredFavs.length > 0 || !keyword)
                    createCategorySection('⭐ Favorites', filteredFavs, false, 'fav-header');
            }

            Object.keys(groupedChannels).forEach(function(categoryName) {
                if (groupedChannels[categoryName].length > 0)
                    createCategorySection(categoryName, groupedChannels[categoryName], shouldExpandAll);
            });
        }

        function createCategorySection(categoryName, channels, isExpanded, specialClass) {
            if (isExpanded === undefined) isExpanded = false;
            if (specialClass === undefined) specialClass = '';

            var headerBtn = document.createElement('button');
            headerBtn.className = 'zoom-category-header';
            if (specialClass) headerBtn.classList.add(specialClass);
            if (isExpanded) headerBtn.classList.add('expanded');
            headerBtn.innerHTML = '<i class="fa-solid fa-chevron-right arrow"></i> <i class="fa-regular fa-folder"></i> ' + categoryName + ' (' + channels.length + ')';

            var subListUl = document.createElement('ul');
            subListUl.className = 'zoom-channel-sublist';
            if (isExpanded) subListUl.classList.add('show');

            channels.forEach(function(channel) {
                var li = document.createElement('li');
                li.className = 'channel-item';
                if (player && player.src && player.src() === channel.url) li.classList.add('active');

                var isStarred = favoriteChannelUrls.indexOf(channel.url) !== -1;
                var logoHTML;
                if (channel.logo) {
                    logoHTML = '<div class="channel-logo"><img src="' + channel.logo + '" alt="' + channel.name + '" onerror="this.parentElement.innerHTML=\'<div class=\\\\\'channel-logo-fallback\\\\\'>' + channel.name.charAt(0).toUpperCase() + '</div>\'"></div>';
                } else {
                    logoHTML = '<div class="channel-logo"><div class="channel-logo-fallback">' + channel.name.charAt(0).toUpperCase() + '</div></div>';
                }

                li.innerHTML = logoHTML +
                    '<div class="channel-name-wrapper"><div class="channel-name">' + channel.name + '</div></div>' +
                    '<button class="fav-star-btn ' + (isStarred ? 'starred' : '') + '"><i class="' + (isStarred ? 'fa-solid' : 'fa-regular') + ' fa-star"></i></button>';

                li.addEventListener('click', function(e) {
                    if (e.target.closest('.fav-star-btn')) return;
                    document.querySelectorAll('.channel-item').forEach(function(el) { el.classList.remove('active'); });
                    li.classList.add('active');
                    player.src({ src: channel.url, type: 'application/x-mpegURL' });
                    player.play().catch(function(err) { console.log('Play error:', err); });
                });

                li.querySelector('.fav-star-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    var idx = favoriteChannelUrls.indexOf(channel.url);
                    if (idx !== -1) {
                        favoriteChannelUrls.splice(idx, 1);
                    } else {
                        favoriteChannelUrls.push(channel.url);
                    }
                    localStorage.setItem('fav_channels', JSON.stringify(favoriteChannelUrls));
                    renderSidebar(searchInput.value.trim());
                });

                subListUl.appendChild(li);
            });

            headerBtn.addEventListener('click', function() {
                headerBtn.classList.toggle('expanded');
                subListUl.classList.toggle('show');
            });

            zoomSidebarContainer.appendChild(headerBtn);
            zoomSidebarContainer.appendChild(subListUl);
        }
    </script>
</body>
</html>
