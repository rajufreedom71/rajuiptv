<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free IPTV by RAJU</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #11141a; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: linear-gradient(to right, #ffe066, #f5b041); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 16px; text-align: center; font-size: 26px; font-weight: 800; border-bottom: 2px solid #1f2937; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .playlist-section { flex: 1; max-width: 400px; background-color: #1a1f29; display: flex; flex-direction: column; border-right: 2px solid #242c3d; }
        .player-section { flex: 3; background-color: #000; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; }
        .search-box-container { padding: 15px; background: #1e2530; }
        .search-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #2e384e; background: #242c3d; color: white; }
        .zoom-sidebar { flex: 1; overflow-y: auto; }
        .channel-item { padding: 12px 20px; border-bottom: 1px solid #1a202c; cursor: pointer; display: flex; align-items: center; color: #cbd5e1; }
        .channel-item:hover { background: #1f2633; color: #f5b041; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .player-section { height: 250px; } }
    </style>
</head>
<body>
    <header>📺 FREE IPTV BY RAJU</header>
    <div class="main-container">
        <div class="playlist-section">
            <div class="search-box-container"><input type="text" id="search-input" class="search-input" placeholder="Search channels..."></div>
            <div class="zoom-sidebar" id="zoom-sidebar-container">Loading...</div>
        </div>
        <div class="player-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay playsinline></video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        // প্রক্সি লিঙ্ক দিয়ে সরাসরি গিটহাব ফাইল ফেচ করা
        const m3uUrl = 'https://corsproxy.io/?https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
        let player = videojs('my-video');

        async function init() {
            try {
                const response = await fetch(m3uUrl);
                const text = await response.text();
                const lines = text.split('\n');
                let container = document.getElementById('zoom-sidebar-container');
                container.innerHTML = '';

                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        let name = lines[i].split(',')[1];
                        let url = lines[i+1];
                        let div = document.createElement('div');
                        div.className = 'channel-item';
                        div.innerHTML = name;
                        div.onclick = () => { player.src({src: url, type: 'application/x-mpegURL'}); player.play(); };
                        container.appendChild(div);
                    }
                }
            } catch (e) {
                document.getElementById('zoom-sidebar-container').innerHTML = 'Error loading list. Check console.';
            }
        }
        init();
    </script>
</body>
</html>
