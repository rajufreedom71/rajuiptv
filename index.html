<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free IPTV by RAJU</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      background: #111; 
      color: #fff; 
    }
    .player { 
      width: 100%; 
      max-width: 1000px; 
      margin: 20px auto; 
    }
    video { 
      width: 100%; 
      background: black; 
    }
    input, button, select { 
      padding: 10px; 
      margin: 5px; 
    }
    select { 
      width: 500px; 
    }
    .controls { 
      text-align: center; 
      margin: 15px; 
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Free IPTV by RAJU</h2>

  <div class="player">
    <video id="video" controls autoplay></video>
  </div>

  <div class="controls">
    <input type="text" id="playlistUrl" placeholder="Enter M3U Playlist URL" style="width:450px;" value="https://iptv-org.github.io/iptv/index.m3u">
    <button onclick="loadPlaylist()">Load Playlist</button>
    <br><br>
    <select id="channelList" size="18" onchange="playChannel(this.value)"></select>
  </div>

  <script>
    let hls;
    const video = document.getElementById('video');

    async function loadPlaylist() {
      const url = document.getElementById('playlistUrl').value.trim();
      if (!url) return alert("Please enter a playlist URL");

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Failed to load playlist");
        
        const text = await res.text();
        const channels = [];
        const lines = text.split('\n');
        let current = {};

        for (let line of lines) {
          if (line.startsWith('#EXTINF')) {
            current.name = line.split(',').pop().trim();
          } else if (line && !line.startsWith('#') && current.name) {
            current.url = line.trim();
            channels.push({name: current.name, url: current.url});
            current = {};
          }
        }

        const select = document.getElementById('channelList');
        select.innerHTML = '';
        channels.forEach(ch => {
          const opt = document.createElement('option');
          opt.value = ch.url;
          opt.textContent = ch.name;
          select.appendChild(opt);
        });
      } catch (e) {
        alert("Error loading playlist: " + e.message);
      }
    }

      if (!url) return;
      
      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else {
        video.src = url;
