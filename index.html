<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Pro - Watch Online</title>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <!-- FontAwesome for Icons like Zoom -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #11141a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1e2530, #0f1319);
            padding: 15px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00ffcc;
            border-bottom: 2px solid #1f2937;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        .playlist-section {
            flex: 1;
            background-color: #1a1f29;
            border-left: 2px solid #242c3d;
            display: flex;
            flex-direction: column;
            max-width: 400px;
            min-width: 320px;
        }
        .playlist-header {
            padding: 15px;
            background-color: #242c3d;
            font-weight: bold;
            font-size: 16px;
            color: #00ffcc;
            border-bottom: 1px solid #2e384e;
        }
        
        /* Zoom Style Category Tabs */
        .zoom-tabs-container {
            background-color: #1e2530;
            padding: 10px;
            border-bottom: 1px solid #2e384e;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }
        /* Custom scrollbar for tabs */
        .zoom-tabs-container::-webkit-scrollbar {
            height: 4px;
        }
        .zoom-tabs-container::-webkit-scrollbar-thumb {
            background: #2e384e;
            border-radius: 10px;
        }

        .zoom-tab {
            background-color: #242c3d;
            color: #b3c2d4;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .zoom-tab i {
            font-size: 14px;
        }
        .zoom-tab:hover {
            background-color: #2e384e;
            color: #ffffff;
        }
        .zoom-tab.active {
            background-color: #0e71eb; /* Zoom Blue color */
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(14, 113, 235, 0.4);
        }

        .channel-list {
            overflow-y: auto;
            flex: 1;
            list-style: none;
        }
        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid #242c3d;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        .channel-item:hover {
            background-color: #242c3d;
            color: #00ffcc;
            padding-left: 20px;
        }
        .channel-item.active {
            background-color: #00ffcc;
            color: #000000;
            font-weight: bold;
        }
        .channel-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px; /* Square with round corners like Zoom icons */
            background-color: #2e384e;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
        }
        .channel-item.active .channel-icon {
            background-color: #000;
            color: #00ffcc;
        }
        /* Responsive design for Mobile */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .player-section {
                flex: none;
                height: 250px;
            }
            .playlist-section {
                max-width: 100%;
                min-width: 100%;
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <header>📺 LIVE TV PRO</header>

    <div class="main-container">
        <!-- Video Player Section -->
        <div class="player-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto" data-setup="{}">
                <p class="vjs-no-js">
                    To view this video please enable JavaScript
                </p>
            </video>
        </div>

        <!-- Sidebar Channel List Section -->
        <div class="playlist-section">
            <div class="playlist-header">চ্যানেল সমূহ (<span id="count">0</span>)</div>
            
            <!-- Zoom Style Horizontal Navigation Tabs -->
            <div class="zoom-tabs-container" id="zoom-tabs">
                <button class="zoom-tab active" data-category="all">
                    <i class="fa-solid fa-grid-22"></i> সব (All)
                </button>
            </div>

            <ul class="channel-list" id="channel-list">
                <li class="channel-item" style="justify-content: center; color: #888;">প্লেলিস্ট লোড হচ্ছে...</li>
            </ul>
        </div>
    </div>

    <!-- Video.js Scripts -->
    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
        
        const player = videojs('my-video');
        const channelListElement = document.getElementById('channel-list');
        const countElement = document.getElementById('count');
        const zoomTabsContainer = document.getElementById('zoom-tabs');

        let allChannels = [];

        async function fetchAndParseM3U() {
            try {
                const response = await fetch(m3uUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                
                const lines = text.split('\n');
                let currentChannel = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        let category = "General";
                        const groupMatch = line.match(/group-title="([^"]+)"/);
                        if (groupMatch && groupMatch[1]) {
                            category = groupMatch[1];
                        }

                        const nameIndex = line.lastIndexOf(',');
                        let name = "Unknown Channel";
                        if (nameIndex !== -1) {
                            name = line.substring(nameIndex + 1).trim();
                        }
                        currentChannel = { name: name, category: category };
                    } else if (line.startsWith('http://') || line.startsWith('https://')) {
                        if (currentChannel) {
                            currentChannel.url = line;
                            allChannels.push(currentChannel);
                            currentChannel = null;
                        }
                    }
                }

                // জুম স্টাইলের ট্যাব মেনু তৈরি করা
                createZoomTabs(allChannels);
                
                // শুরুতে সব চ্যানেল শো করা
                displayChannels(allChannels);
                
            } catch (error) {
                console.error('Error loading M3U file:', error);
                channelListElement.innerHTML = '<li class="channel-item" style="color: red; justify-content: center;">প্লেলিস্ট লোড করা যায়নি!</li>';
            }
        }

        // Zoom Style Tabs জেনারেট করার ফাংশন
        function createZoomTabs(channels) {
            const categories = new Set();
            channels.forEach(channel => {
                if(channel.category) categories.add(channel.category);
            });

            // প্রতিটি ইউনিক ক্যাটাগরির জন্য একটি করে সুন্দর বাটন তৈরি
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'zoom-tab';
                btn.setAttribute('data-category', category);
                
                // জুম অ্যাপের মতো আইকন সেট করা (টিভি বা লিস্ট আইকন)
                btn.innerHTML = `<i class="fa-solid fa-tv"></i> ${category}`;
                zoomTabsContainer.appendChild(btn);
            });

            // ট্যাব ক্লিকের ইভেন্ট হ্যান্ডলার
            const tabs = document.querySelectorAll('.zoom-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // আগের অ্যাক্টিভ ট্যাব রিমুভ করে নতুনটায় সেট করা
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    const selectedCategory = tab.getAttribute('data-category');
                    
                    if (selectedCategory === 'all') {
                        displayChannels(allChannels);
                    } else {
                        const filtered = allChannels.filter(c => c.category === selectedCategory);
                        displayChannels(filtered);
                    }
                });
            });
        }

        function displayChannels(channels) {
            channelListElement.innerHTML = '';
            countElement.innerText = channels.length;

            if (channels.length === 0) {
                channelListElement.innerHTML = '<li class="channel-item" style="justify-content: center;">কোনো চ্যানেল পাওয়া যায়নি।</li>';
                return;
            }

            channels.forEach((channel, index) => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                
                const firstLetter = channel.name.charAt(0).toUpperCase();
                
                li.innerHTML = `
                    <div class="channel-icon">${firstLetter}</div>
                    <div>${channel.name}</div>
                `;

                li.addEventListener('click', () => {
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');

                    player.src({
                        src: channel.url,
                        type: 'application/x-mpegURL'
                    });
                    player.play();
                });

                channelListElement.appendChild(li);

                if (index === 0 && player.src() === "") {
                    li.classList.add('active');
                    player.src({
                        src: channel.url,
                        type: 'application/x-mpegURL'
                    });
                }
            });
        }

        window.onload = fetchAndParseM3U;
    </script>
</body>
</html>
