<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Free IPTV by RAJU</title>
  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <!-- Quality Selector Plugin CSS -->
  <link href="https://cdn.jsdelivr.net/npm/videojs-http-source-selector@1.1.7/dist/videojs-http-source-selector.css" rel="stylesheet" />
</head>
<body>

  <h2 style="text-align:center;">Free IPTV by RAJU</h2>

  <!-- Channel Selector -->
  <select id="channelSelect"></select>

  <!-- Video.js Player -->
  <video
    id="my-video"
    class="video-js vjs-default-skin"
    controls
    preload="auto"
    width="640"
    height="360"
    data-setup='{}'>
    <source src="" type="application/x-mpegURL" />
  </video>

  <!-- Video.js JS -->
  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <!-- Quality Selector Plugin JS -->
  <script src="https://cdn.jsdelivr.net/npm/videojs-http-source-selector@1.1.7/dist/videojs-http-source-selector.min.js"></script>

  <script>
    var player = videojs('my-video');

    // Enable resolution selector
    player.httpSourceSelector();
    player.on('ready', function() {
      player.controlBar.addChild('HttpSourceSelector');
    });

    // Load playlist.m3 file
    fetch('playlist.m3u')
      .then(response => response.text())
      .then(data => {
        const lines = data.split('\n');
        const channels = {};
        let currentName = '';
        lines.forEach(line => {
          if (line.startsWith('#EXTINF')) {
            const nameMatch = line.match(/,(.*)$/);
            if (nameMatch) currentName = nameMatch[1].trim();
          } else if (line.startsWith('http')) {
            if (!channels[currentName]) channels[currentName] = [];
            channels[currentName].push(line.trim());
          }
        });

        // Populate dropdown
        const select = document.getElementById('channelSelect');
        Object.keys(channels).forEach(name => {
          channels[name].forEach((url, index) => {
            const option = document.createElement('option');
            option.value = url;
            option.text = name + " - Server " + (index+1);
            select.appendChild(option);
          });
        });

        // Load first channel
        if (select.options.length > 0) {
          player.src({ src: select.options[0].value, type: 'application/x-mpegURL' });
          player.play();
        }

        // Change channel on selection
        select.addEventListener('change', function() {
          player.src({ src: this.value, type: 'application/x-mpegURL' });
          player.play();
        });
      });
  </script>

</body>
</html>
