<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Free IPTV by RAJU</title>
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
</head>
<body>

  <h2 style="text-align:center;">Free IPTV by RAJU</h2>

  <select id="channelSelect">
    <option value="https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8">BTV National</option>
    <option value="https://tvsen6.aynaott.com/channeli/index.m3u8?e=1780495063&token=b461fef067049d465806406d979b57b1">Channel I</option>
  </select>

  <video
    id="my-video"
    class="video-js vjs-default-skin"
    controls
    preload="auto"
    width="640"
    height="360">
  </video>

  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script>
    var player = videojs('my-video');

    const select = document.getElementById('channelSelect');
    function loadChannel(url) {
      player.src({ src: url, type: 'application/x-mpegURL' });
      player.play();
    }

    // Load first channel
    loadChannel(select.value);

    // Change channel
    select.addEventListener('change', function() {
      loadChannel(this.value);
    });
  </script>

</body>
</html>
