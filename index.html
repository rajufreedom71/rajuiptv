<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free IPTV by RAJU</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #11141a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #161b26, #090b10);
            padding: 12px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to right, #ffe066, #f5b041);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 2px solid #1f2937;
            flex-shrink: 0;
        }
        .stats-bar {
            background: #1a1f29;
            padding: 8px 15px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #242c3d;
            flex-shrink: 0;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }
        .playlist-section {
            display: flex;
            flex-direction: column;
            background-color: #1a1f29;
            border-right: 2px solid #242c3d;
            flex: 1;
            max-width: 400px;
            min-width: 320px;
            order: 1;
            overflow: hidden;
        }
        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            order: 2;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        .search-box-container {
            padding: 15px;
            background-color: #1e2530;
            border-bottom: 1px solid #2e384e;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background-color: #242c3d;
            border: 1px solid #2e384e;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus {
            border-color: #f5b041;
        }
        .search-icon {
            position: absolute;
            left: 27px;
            top: 50%;
            transform: translateY(-50%);
            color: #8899a6;
            font-size: 14px;
            pointer-events: none;
        }
        .zoom-sidebar {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }
        .zoom-category-header {
            width: 100%;
            background: transparent;
            color: #b3c2d4;
            border: none;
            padding: 13px 20px;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #1f2633;
        }
        .zoom-category-header:hover {
            background-color: #242c3d;
            color: #ffffff;
        }
        .zoom-category-header i.arrow {
            font-size: 12px;
            transition: transform 0.2s ease;
            width: 12px;
        }
        .zoom-category-header.expanded {
            color: #f5b041;
            background-color: #1f2633;
            border-bottom: none;
        }
        .zoom-category-header.expanded i.arrow {
            transform: rotate(90deg);
        }
        .all-header { color: #00ffcc !important; }
        .fav-header { color: #ffcc00 !important; }
        .zoom-channel-sublist {
            list-style: none;
            display: none;
            background-color: #141822;
            border-left: 3px solid #242c3d;
            margin-left: 10px;
        }
        .zoom-channel-sublist.show {
            display: block;
        }
        .channel-item {
            padding: 12px 20px;
            border-bottom: 1px solid #1a202c;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #cbd5e1;
            position: relative;
        }
        .channel-item:hover {
            background-color: #1f2633;
            color: #f5b041;
        }
        .channel-item.active {
            background: linear-gradient(90deg, #1d2b3a, #151e29);
            color: #f5b041;
            font-weight: bold;
            border-left: 3px solid #f5b041;
        }
        .channel-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background-color: #2e384e;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
        }
        .fav-star-btn {
            position: absolute;
            right: 20px;
            background: transparent;
            border: none;
            color: #4a5768;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
        }
        .fav-star-btn.starred {
            color: #ffcc00 !important;
        }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .player-section { height: 40vh; order: 1; }
            .playlist-section { order: 2; max-width: 100%; min-width: 100%; }
            .zoom-sidebar { flex: 1; overflow-y: auto; }
        }
    </style>
</head>
<body>
    <header>📺 FREE IPTV BY RAJU</header>
    
    <div class="stats-bar">
        <div>Last Updated: <span id="last-updated">Loading...</span></div>
        <div>Total Visits: <span id="total-visits">0</span> | Online: <span id="online-now">1</span></div>
    </div>

    <div class="main-container">
        <div class="playlist-section">
            <div class="search-box-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search channels..." />
            </div>
            <div class="zoom-sidebar" id="zoom-sidebar-container">
                <div style="padding: 20px; color: #8899a6; text-align: center;" id="loading-text">Loading channels...</div>
            </div>
        </div>
        <div class="player-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay playsinline preload="auto"></video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@2.1.0/dist/videojs-contrib-quality-levels.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-hls-quality-selector@3.5.0/dist/videojs-hls-quality-selector.min.js"></script>

    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
        
        let player;
        let allChannels = [];
        let favoriteChannelUrls = JSON.parse(localStorage.getItem('fav_channels')) || [];

        const lastUpdatedEl = document.getElementById('last-updated');
        const totalVisitsEl = document.getElementById('total-visits');
        const onlineNowEl = document.getElementById('online-now');

        function updateVisitorStats() {
            let visits = parseInt(localStorage.getItem('total_visits') || '0') + 1;
            localStorage.setItem('total_visits', visits);
            totalVisitsEl.textContent = visits.toLocaleString();
            const online = Math.floor(Math.random() * 34) + 12;
            onlineNowEl.textContent = online;
        }

        document.addEventListener("DOMContentLoaded", function() {
            player = videojs('my-video');
            try {
                player.hlsQualitySelector({ displayCurrentQuality: true });
            } catch(e) {}

            const now = new Date();
            lastUpdatedEl.textContent = now.toLocaleString('en-GB', { 
                day: '2-digit', month: 'short', year: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });

            updateVisitorStats();
            fetchAndParseM3U();
        });

        async function fetchAndParseM3U() {
            const loadingText = document.getElementById('loading-text');
            loadingText.textContent = "Loading playlist...";
            
            try {
                const response = await fetch(m3uUrl + '?t=' + Date.now());
                if (!response.ok) throw new Error('Network error');

                const text = await response.text();
                const lines = text.split('\n');
                allChannels = [];
                let currentChannel = null;

                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('#EXTINF')) {
                        const nameMatch = line.split(',').pop();
                        const name = nameMatch ? nameMatch.trim() : "Unknown";
                        const groupMatch = line.match(/group-title="([^"]*)"/);
                        const category = groupMatch ? groupMatch[1] : "General";
                        currentChannel = { name: name, category: category, url: "" };
                    } 
                    else if (line && !line.startsWith('#') && currentChannel) {
                        currentChannel.url = line;
                        allChannels.push(currentChannel);
                        currentChannel = null;
                    }
                }

                renderSidebar();
                document.getElementById('search-input').addEventListener('input', () => {
                    renderSidebar(document.getElementById('search-input').value.trim());
                });
                loadingText.style.display = 'none';

            } catch (error) {
                console.error(error);
                loadingText.innerHTML = '<span style="color:red;">Failed to load playlist</span>';
            }
        }

        function renderSidebar(filterKeyword = "") {
            const container = document.getElementById('zoom-sidebar-container');
            container.innerHTML = '';
            const keyword = filterKeyword.toLowerCase();
            const favChannels = allChannels.filter(c => favoriteChannelUrls.includes(c.url));
            const groupedChannels = {};

            allChannels.forEach(channel => {
                if (keyword && !channel.name.toLowerCase().includes(keyword)) return;
                if (!groupedChannels[channel.category]) groupedChannels[channel.category] = [];
                groupedChannels[channel.category].push(channel);
            });

            const shouldExpandAll = keyword !== "";

            if (allChannels.length > 0 && !keyword) {
                createCategorySection("🌐 All Channels", allChannels, false, "all-header");
            }
            if (favChannels.length > 0) {
                const filteredFavs = favChannels.filter(c => c.name.toLowerCase().includes(keyword));
                if (filteredFavs.length > 0 || !keyword) {
                    createCategorySection("⭐ Favorites", filteredFavs, false, "fav-header");
                }
            }

            Object.keys(groupedChannels).forEach(categoryName => {
                if (groupedChannels[categoryName].length > 0) {
                    createCategorySection(categoryName, groupedChannels[categoryName], shouldExpandAll);
                }
            });

            if (container.children.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #888; text-align: center;">No channels found!</div>';
            }
        }

        function createCategorySection(categoryName, channels, isExpandedByDefault = false, specialClass = "") {
            const headerBtn = document.createElement('button');
            headerBtn.className = 'zoom-category-header';
            if (specialClass) headerBtn.classList.add(specialClass);
            headerBtn.innerHTML = `<i class="fa-solid fa-chevron-right arrow"></i> <i class="fa-regular fa-folder"></i> ${categoryName} (${channels.length})`;
            
            const subListUl = document.createElement('ul');
            subListUl.className = 'zoom-channel-sublist';
            if (isExpandedByDefault) {
                headerBtn.classList.add('expanded');
                subListUl.classList.add('show');
            }

            channels.forEach((channel) => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                const firstLetter = channel.name.charAt(0).toUpperCase();
                const isStarred = favoriteChannelUrls.includes(channel.url);

                li.innerHTML = `
                    <div class="channel-icon">${firstLetter}</div>
                    <div style="flex: 1; padding-right: 30px;">${channel.name}</div>
                    <button class="fav-star-btn ${isStarred ? 'starred' : ''}">
                        <i class="${isStarred ? 'fa-solid' : 'fa-regular'} fa-star"></i>
                    </button>
                `;

                li.addEventListener('click', (e) => {
                    if (e.target.closest('.fav-star-btn')) return;
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    player.src({ src: channel.url, type: 'application/x-mpegURL' });
                    player.play().catch(() => {});
                });

                const starBtn = li.querySelector('.fav-star-btn');
                starBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (favoriteChannelUrls.includes(channel.url)) {
                        favoriteChannelUrls = favoriteChannelUrls.filter(url => url !== channel.url);
                    } else {
                        favoriteChannelUrls.push(channel.url);
                    }
                    localStorage.setItem('fav_channels', JSON.stringify(favoriteChannelUrls));
                    renderSidebar(document.getElementById('search-input').value.trim());
                });

                subListUl.appendChild(li);
            });

            headerBtn.addEventListener('click', () => {
                const isExpanded = headerBtn.classList.contains('expanded');
                if (isExpanded) {
                    headerBtn.classList.remove('expanded');
                    subListUl.classList.remove('show');
                } else {
                    headerBtn.classList.add('expanded');
                    subListUl.classList.add('show');
                }
            });

            const container = document.getElementById('zoom-sidebar-container');
            container.appendChild(headerBtn);
            container.appendChild(subListUl);
        }
    </script>
</body>
</html>
