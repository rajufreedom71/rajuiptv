<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV by RAJU</title>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #11141a; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header & Container */
        header { padding: 16px 20px; text-align: center; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #ffe066, #f5b041); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 2px solid #1f2937; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar Design */
        .playlist-section { flex: 1; max-width: 400px; background-color: #1a1f29; border-right: 2px solid #242c3d; overflow-y: auto; }
        .zoom-category-header { width: 100%; padding: 13px 20px; background: #1f2633; color: #f5b041; border: none; text-align: left; font-weight: 600; cursor: pointer; }
        .channel-item { padding: 12px 20px; border-bottom: 1px solid #1a202c; cursor: pointer; color: #cbd5e1; }
        .channel-item:hover { background-color: #1f2633; color: #f5b041; }
        
        /* Player Section */
        .player-section { flex: 3; background-color: #000; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <header>📺 FREE IPTV BY RAJU</header>

    <div class="main-container">
        <div class="playlist-section" id="sidebar">Loading channels...</div>
        <div class="player-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay playsinline></video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
        let player = videojs('my-video');

        async function init() {
            const response = await fetch(m3uUrl);
            const text = await response.text();
            const lines = text.split('\n');
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            
            let currentCategory = "";

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    // ক্যাটাগরি বের করা
                    const groupMatch = lines[i].match(/group-title="([^"]+)"/);
                    const category = groupMatch ? groupMatch[1] : "General";
                    
                    if (category !== currentCategory) {
                        currentCategory = category;
                        let catDiv = document.createElement('div');
                        catDiv.className = 'zoom-category-header';
                        catDiv.innerHTML = `<i class="fa-solid fa-folder"></i> ${category}`;
                        sidebar.appendChild(catDiv);
                    }

                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    let chDiv = document.createElement('div');
                    chDiv.className = 'channel-item';
                    chDiv.innerHTML = name;
                    chDiv.onclick = () => { 
                        player.src({src: url, type: 'application/x-mpegURL'}); 
                        player.play(); 
                    };
                    sidebar.appendChild(chDiv);
                }
            }
        }
        init();
    </script>
</body>
</html>
