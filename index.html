<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV by RAJU</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #11141a; color: white; display: flex; height: 100vh; font-family: sans-serif; }
        .sidebar { width: 300px; background: #1a1f29; overflow-y: auto; border-right: 1px solid #333; }
        .player { flex: 1; display: flex; align-items: center; justify-content: center; background: black; }
        .channel { padding: 15px; cursor: pointer; border-bottom: 1px solid #222; }
        .channel:hover { background: #242c3d; color: #f5b041; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">Loading channels...</div>
    <div class="player">
        <video id="video" class="video-js vjs-big-play-centered" controls autoplay playsinline></video>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('video');
        const sidebar = document.getElementById('sidebar');

        // সরাসরি আপনার গিটহাবের লিংক
        const playlistUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';

        async function loadPlaylist() {
            try {
                // প্রক্সি ছাড়াই চেষ্টা করছি, কারণ অনেক সময় প্রক্সি নিজেই এরর দেয়
                const response = await fetch(playlistUrl);
                const data = await response.text();
                const lines = data.split('\n');
                sidebar.innerHTML = '';

                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        const name = lines[i].split(',')[1];
                        const url = lines[i + 1];
                        const div = document.createElement('div');
                        div.className = 'channel';
                        div.textContent = name;
                        div.onclick = () => {
                            player.src({ src: url, type: 'application/x-mpegURL' });
                            player.play();
                        };
                        sidebar.appendChild(div);
                    }
                }
            } catch (err) {
                sidebar.innerHTML = 'Error loading list: ' + err.message;
            }
        }

        loadPlaylist();
    </script>
</body>
</html>
