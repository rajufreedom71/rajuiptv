<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="header">📺 Free IPTV by RAJU</div>

<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet"/>

<style>
body{
    margin:0;
    background:#0b0d12;
    color:#fff;
    font-family:Arial;
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:360px;
    background:#141824;
    border-right:1px solid #222;
    display:flex;
    flex-direction:column;
}

/* TITLE (DO NOT CHANGE TEXT) */
.header{
    padding:14px;
    font-weight:bold;
    border-bottom:1px solid #222;
}

/* SEARCH */
.search{
    padding:10px;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1f2433;
    color:white;
}

/* CATEGORY (COLLAPSIBLE) */
.catHeader{
    padding:10px;
    cursor:pointer;
    background:#1b2030;
    font-weight:bold;
    border-top:1px solid #222;
    border-bottom:1px solid #222;
}

.catBox{
    display:none;
    flex-wrap:wrap;
    padding:10px;
    gap:6px;
}

.catBox.open{
    display:flex;
}

.cat{
    padding:6px 10px;
    background:#1f2433;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
}

.cat.active{
    background:#f5b041;
    color:black;
}

/* FAVORITES */
.favHeader{
    padding:10px;
    font-weight:bold;
    background:#1b2030;
    border-top:1px solid #222;
    border-bottom:1px solid #222;
}

.list{
    flex:1;
    overflow:auto;
}

.item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.item:hover{
    background:#1f2433;
}

.item.active{
    background:#f5b041;
    color:black;
}

.left{
    display:flex;
    align-items:center;
    gap:10px;
}

.item img{
    width:34px;
    height:34px;
    border-radius:50%;
}

.star{
    cursor:pointer;
    font-size:18px;
    user-select:none;
}

/* PLAYER (FIXED SIZE) */
.player{
    flex:1;
    position:relative;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* FIXED CONTAINER (NO RESIZE BUG) */
.videoWrap{
    width:100%;
    height:100%;
    max-width:100%;
    max-height:100%;
}

.now{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:6px;
    z-index:10;
}

/* QUALITY BUTTON */
.qualityBox{
    position:absolute;
    top:10px;
    right:10px;
    z-index:10;
}

.qualityBox select{
    background:#1f2433;
    color:white;
    border:none;
    padding:6px;
    border-radius:6px;
}

/* RESPONSIVE */
@media(max-width:768px){
    body{flex-direction:column;}
    .sidebar{width:100%;height:45%;}
    .player{height:55%;}
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="header">📺 RAJU IPTV V2</div>

    <div class="search">
        <input id="search" placeholder="Search channel...">
    </div>

    <div class="catHeader" id="catToggle">📂 Categories (Click to Expand)</div>
    <div class="catBox" id="cats"></div>

    <div class="favHeader">⭐ Favorites</div>
    <div class="list" id="favList"></div>

    <div class="favHeader">📺 Channels</div>
    <div class="list" id="list"></div>

</div>

<div class="player">

    <div class="now" id="now">▶ Select Channel</div>

    <div class="qualityBox">
        <select id="quality">
            <option value="auto">Auto</option>
        </select>
    </div>

    <div class="videoWrap">
        <video id="video" class="video-js vjs-big-play-centered" controls autoplay></video>
    </div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

<script>

const player = videojs('video');

const url = "https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u";

let data = [];
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");

const list = document.getElementById("list");
const favList = document.getElementById("favList");
const cats = document.getElementById("cats");
const search = document.getElementById("search");
const now = document.getElementById("now");

/* CATEGORY TOGGLE (ZOOM STYLE COLLAPSE) */
document.getElementById("catToggle").onclick = ()=>{
    cats.classList.toggle("open");
};

/* LOAD */
async function load(){
    const res = await fetch(url);
    const text = await res.text();
    const lines = text.split("\n");

    let temp = {};

    for(let i=0;i<lines.length;i++){
        if(lines[i].includes("#EXTINF")){
            const name = lines[i].split(",")[1] || "Unknown";

            const group = (lines[i].match(/group-title="(.*?)"/)||[])[1] || "Others";
            const logo = (lines[i].match(/tvg-logo="(.*?)"/)||[])[1]
            || "https://cdn-icons-png.flaticon.com/512/1041/1041916.png";

            const link = lines[i+1];

            const key = name+link;
            temp[key] = {name,group,logo,link};
        }
    }

    data = Object.values(temp);

    renderCats();
    render();
}

/* CATEGORIES */
function renderCats(){
    const groups = ["All", ...new Set(data.map(x=>x.group))];

    cats.innerHTML = "";

    groups.forEach(g=>{
        const d = document.createElement("div");
        d.className = "cat";
        d.textContent = g;

        d.onclick = ()=>{
            filter(g);
        };

        cats.appendChild(d);
    });
}

/* FILTER */
let currentCat = "All";

function filter(g){
    currentCat = g;
    render();
}

/* RENDER */
function render(){

    let arr = data;

    if(currentCat !== "All"){
        arr = arr.filter(x=>x.group === currentCat);
    }

    const key = search.value.toLowerCase();
    if(key){
        arr = arr.filter(x=>x.name.toLowerCase().includes(key));
    }

    list.innerHTML = "";

    arr.forEach(ch=>{
        const d = document.createElement("div");
        d.className = "item";

        const isFav = favorites.includes(ch.link);

        d.innerHTML = `
            <div class="left">
                <img src="${ch.logo}">
                <div>${ch.name}</div>
            </div>
            <div class="star">${isFav ? "⭐" : "☆"}</div>
        `;

        d.onclick = ()=>{
            play(ch);
        };

        d.querySelector(".star").onclick = (e)=>{
            e.stopPropagation();
            toggleFav(ch);
        };

        list.appendChild(d);
    });

    renderFav();
}

/* FAVORITE */
function toggleFav(ch){
    if(favorites.includes(ch.link)){
        favorites = favorites.filter(x=>x!==ch.link);
    }else{
        favorites.push(ch.link);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    render();
}

/* FAVORITE LIST */
function renderFav(){
    favList.innerHTML = "";

    data.filter(x=>favorites.includes(x.link)).forEach(ch=>{
        const d = document.createElement("div");
        d.className = "item";

        d.innerHTML = `
            <div class="left">
                <img src="${ch.logo}">
                <div>${ch.name}</div>
            </div>
            <div class="star">⭐</div>
        `;

        d.onclick = ()=>play(ch);

        favList.appendChild(d);
    });
}

/* PLAY */
function play(ch){

    document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));

    player.src({src:ch.link,type:"application/x-mpegURL"});
    player.play();

    now.innerText = "▶ Now Playing: " + ch.name;

    localStorage.setItem("last", JSON.stringify(ch));
}

/* SEARCH */
search.addEventListener("input", render);

load();

</script>

</body>
</html>
