<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Pro - Watch Online</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #11141a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1e2530, #0f1319);
            padding: 15px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00ffcc;
            border-bottom: 2px solid #1f2937;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        .playlist-section {
            flex: 1;
            background-color: #1a1f29;
            border-left: 2px solid #242c3d;
            display: flex;
            flex-direction: column;
            max-width: 400px;
            min-width: 300px;
        }
        .playlist-header {
            padding: 15px;
            background-color: #242c3d;
            font-weight: bold;
            font-size: 16px;
            color: #00ffcc;
            border-bottom: 1px solid #2e384e;
        }
        .channel-list {
            overflow-y: auto;
            flex: 1;
            list-style: none;
        }
        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid #242c3d;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        .channel-item:hover {
            background-color: #242c3d;
            color: #00ffcc;
            padding-left: 20px;
        }
        .channel-item.active {
            background-color: #00ffcc;
            color: #000000;
            font-weight: bold;
        }
        .channel-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #2e384e;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
        }
        .channel-item.active .channel-icon {
            background-color: #000;
            color: #00ffcc;
        }
        /* Responsive design for Mobile */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .player-section {
                flex: none;
                height: 250px;
            }
            .playlist-section {
                max-width: 100%;
                min-width: 100%;
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <header>📺 LIVE TV PRO</header>

    <div class="main-container">
        <div class="player-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto" data-setup="{}">
                <p class="vjs-no-js">
                    To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video
                </p>
            </video>
        </div>

        <div class="playlist-section">
            <div class="playlist-header">চ্যানেল সমূহ (<span id="count">0</span>)</div>
            <ul class="channel-list" id="channel-list">
                <li class="channel-item" style="justify-content: center; color: #888;">প্লেলিস্ট লোড হচ্ছে...</li>
            </ul>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

    <script>
        // আপনার গিটহাবের র (Raw) প্লেলিস্ট লিংক
        const m3uUrl = 'https://raw.githubusercontent.com/rajufreedom71/rajuiptv/main/playlist.m3u';
        
        const player = videojs('my-video');
        const channelListElement = document.getElementById('channel-list');
        const countElement = document.getElementById('count');

        // M3U ফাইলটি রিড এবং পার্স করার ফাংশন
        async function fetchAndParseM3U() {
            try {
                const response = await fetch(m3uUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                
                const lines = text.split('\n');
                const channels = [];
                let currentChannel = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        // চ্যানেলের নাম খুঁজে বের করা (কমা এর পরের অংশ)
                        const nameIndex = line.lastIndexOf(',');
                        let name = "Unknown Channel";
                        if (nameIndex !== -1) {
                            name = line.substring(nameIndex + 1).trim();
                        }
                        currentChannel = { name: name };
                    } else if (line.startsWith('http://') || line.startsWith('https://')) {
                        if (currentChannel) {
                            currentChannel.url = line;
                            channels.push(currentChannel);
                            currentChannel = null;
                        }
                    }
                }

                displayChannels(channels);
            } catch (error) {
                console.error('Error loading M3U file:', error);
                channelListElement.innerHTML = '<li class="channel-item" style="color: red; justify-content: center;">প্লেলিস্ট লোড করা যায়নি!</li>';
            }
        }

        // ওয়েবসাইটে চ্যানেলের তালিকা দেখানোর ফাংশন
        function displayChannels(channels) {
            channelListElement.innerHTML = '';
            countElement.innerText = channels.length;

            if (channels.length === 0) {
                channelListElement.innerHTML = '<li class="channel-item" style="justify-content: center;">কোনো চ্যানেল পাওয়া যায়নি।</li>';
                return;
            }

            channels.forEach((channel, index) => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                
                // প্রথম অক্ষরের আইকন তৈরি
                const firstLetter = channel.name.charAt(0).toUpperCase();
                
                li.innerHTML = `
                    <div class="channel-icon">${firstLetter}</div>
                    <div>${channel.name}</div>
                `;

                // চ্যানেলে ক্লিক করলে প্লে হওয়ার ইভেন্ট
                li.addEventListener('click', () => {
                    // অ্যাক্টিভ ক্লাস পরিবর্তন
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');

                    // প্লেয়ারে নতুন লিংক লোড করা
                    player.src({
                        src: channel.url,
                        type: 'application/x-mpegURL'
                    });
                    player.play();
                });

                channelListElement.appendChild(li);

                // প্রথম চ্যানেলটি ডিফল্ট হিসেবে প্লেয়ারে সেট করে রাখা
                if (index === 0) {
                    li.classList.add('active');
                    player.src({
                        src: channel.url,
                        type: 'application/x-mpegURL'
                    });
                }
            });
        }

        // পেজ লোড হলে ফাংশনটি রান করবে
        window.onload = fetchAndParseM3U;
    </script>
</body>
</html>
